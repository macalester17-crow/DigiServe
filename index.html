<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DigiServe IT Solutions</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background-color: #f8f9fa;
}

.card img {
  height: 200px;
  object-fit: cover;
}

footer {
  background: #212529;
  color: white;
  text-align: center;
  padding: 15px;
  margin-top: 20px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container-fluid">
<a class="navbar-brand" href="#">DigiServe</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="nav">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="#home">Home</a></li>
<li class="nav-item"><a class="nav-link" href="#services">Services</a></li>
<li class="nav-item"><a class="nav-link" href="#testimonials">Testimonials</a></li>
<li class="nav-item">
<a class="nav-link" href="#" data-bs-toggle="modal" data-bs-target="#formModal">Request</a>
</li>
</ul>
</div>
</div>
</nav>

<!-- CAROUSEL -->
<div class="carousel slide" data-bs-ride="carousel">
<div class="carousel-inner">
<div class="carousel-item active">
<img src="sea.jpg" class="d-block w-100">
</div>
<div class="carousel-item">
<img src="amazon.jpg" class="d-block w-100">
</div>
<div class="carousel-item">
<img src="mountain.jpg" class="d-block w-100">
</div>
</div>
</div>

<!-- SERVICES -->
<section id="services" class="container my-5">
<h2 class="text-center mb-4">Our Services</h2>
<div class="row" id="serviceList"></div>
</section>

<!-- TESTIMONIALS -->
<section id="testimonials" class="container my-5">
<h2 class="text-center mb-4">Testimonials</h2>
<div class="row">
<div class="col-md-4">
<div class="card p-3">
<p>"Amazing website development!👍"</p>
<small>- Ali</small>
</div>
</div>

<div class="col-md-4">
<div class="card p-3">
<p>"Very reliable IT support.📝"</p>
<small>- Louis</small>
</div>
</div>

<div class="col-md-4">
<div class="card p-3">
<p>"Helped grow my business online!💰📊"</p>
<small>- Steven</small>
</div>
</div>
</div>
</section>

<!-- MODAL FORM -->
<div class="modal fade" id="formModal">
<div class="modal-dialog">
<div class="modal-content">

<form onsubmit="return validateForm()">

<div class="modal-header">
<h5>Consultation Request</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<input type="text" id="name" class="form-control mb-2" placeholder="Name">
<input type="email" id="email" class="form-control mb-2" placeholder="Email">

<select id="service" class="form-control mb-2">
<option value="">Select Service</option>
<option>Web Development</option>
<option>System Maintenance</option>
<option>Digital Marketing</option>
</select>

<textarea id="message" class="form-control mb-2" placeholder="Message"></textarea>

<div class="form-check">
<input class="form-check-input" type="checkbox" id="consent">
<label>I agree to data privacy terms</label>
</div>

</div>

<div class="modal-footer">
<button type="submit" class="btn btn-primary">Submit</button>
</div>

</form>
</div>
</div>
</div>

<!-- FOOTER -->
<footer>
<p>© 2026 DigiServe | By Mac G-Pros</p>
</footer>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

// SERVICES DATA (ARRAY)
let services = [
{ name: "Web Development", desc: "Build modern websites", img: "sunset.jpg" },
{ name: "System Maintenance", desc: "Fix and maintain systems", img: "beach.jpg" },
{ name: "Digital Marketing", desc: "Grow your business online", img: "train.jpg" }
];

// DISPLAY SERVICES
let list = document.getElementById("serviceList");

services.forEach(s => {
list.innerHTML += `
<div class="col-md-4 mb-4">
<div class="card" data-bs-toggle="tooltip" title="${s.name}">
<img src="${s.img}" class="card-img-top">
<div class="card-body text-center">
<h5>${s.name}</h5>
<p>${s.desc}</p>
</div>
</div>
</div>
`;
});

// TOOLTIP
let tooltipList = document.querySelectorAll('[data-bs-toggle="tooltip"]');
tooltipList.forEach(el => new bootstrap.Tooltip(el));

// SMOOTH SCROLL
$('a.nav-link').click(function(e){
if(this.hash){
e.preventDefault();
$('html,body').animate({
scrollTop: $(this.hash).offset().top
},800);
}
});

// VALIDATION
function validateForm(){
let name = document.getElementById("name").value;
let email = document.getElementById("email").value;
let service = document.getElementById("service").value;
let message = document.getElementById("message").value;
let consent = document.getElementById("consent").checked;

if(name==""||email==""||service==""||message==""){
alert("Please fill all fields!");
return false;
}

if(!email.includes("@")){
alert("Invalid email!");
return false;
}

if(!consent){
alert("Please agree to consent!");
return false;
}

alert("Submitted successfully!");
return true;
}

</script>

</body>
</html>
